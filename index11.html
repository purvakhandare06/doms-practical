<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Button to add new paragraph -->
<button onclick="add()">Add Paragraph</button>
<script>
function add(){
// Create new paragraph element
let p = document.createElement("p");
// Add text inside paragraph
p.innerHTML = "New Paragraph Created";
// Add paragraph to webpage body
document.body.appendChild(p);
}
</script>
</body>
</html>
